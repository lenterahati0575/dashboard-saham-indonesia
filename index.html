<style>
body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
.glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
.signal-strong-buy { background: linear-gradient(135deg, #059669, #10b981); color: white; }
.signal-buy { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
.signal-weak-buy { background: rgba(52, 211, 153, 0.2); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
.signal-hold { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
.signal-weak-sell { background: rgba(249, 115, 22, 0.2); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
.signal-sell { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.signal-strong-sell { background: linear-gradient(135deg, #dc2626, #ef4444); color: white; }
.live-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.live-badge.live { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.live-badge.embedded { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.live-badge.error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.stock-row:hover { background: rgba(59, 130, 246, 0.08); }
.tv-link { color: #60a5fa; text-decoration: none; font-weight: 600; }
.tv-link:hover { color: #93c5fd; text-decoration: underline; }
.tv-btn { background: rgba(59, 130, 246, 0.15); color: #60a5fa; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid rgba(59,130,246,0.2); }
.tv-btn:hover { background: rgba(59, 130, 246, 0.3); }
.sector-tag { background: rgba(139, 92, 246, 0.15); color: #a78bfa; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.compact-chart { max-height: 160px; }
.gainer { color: #34d399; } .loser { color: #f87171; }
.loading { animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

<body class="min-h-screen">
<div class="container mx-auto px-4 py-5 max-w-7xl">
<div class="glass rounded-2xl p-5 mb-4">
<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
<div>
<h1 class="text-2xl font-bold text-white"><i class="fas fa-chart-line text-blue-400 mr-2"></i>Dashboard Analisis Saham Indonesia</h1>
<p class="text-slate-400 text-sm mt-1"><span class="text-white font-semibold" id="stockCount">615</span> Saham IDX | Update: <span id="lastUpdate">--</span> | <span id="liveStatus" class="live-badge embedded"><i class="fas fa-database mr-1"></i>DATA EMBEDDED</span></p>
</div>
<div class="flex gap-2">
<button onclick="refreshData()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition"><i class="fas fa-sync-alt mr-1"></i>Refresh</button>
<button onclick="fetchLiveData()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition"><i class="fas fa-satellite-dish mr-1"></i>Live</button>
</div>
</div>
<div class="mt-4 space-y-3">
<div class="relative">
<i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
<input type="text" id="searchInput" placeholder="Cari kode saham, nama, atau sinyal..." class="w-full pl-11 pr-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition text-sm" oninput="filterStocks()">
</div>
<div class="flex flex-wrap gap-2">
<select id="filterSignal" onchange="filterStocks()" class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-white focus:outline-none focus:border-blue-500">

<option value="STRONG BUY">STRONG BUY</option>
<option value="BUY">BUY</option>
<option value="WEAK BUY">WEAK BUY</option>
<option value="HOLD NEUTRAL">HOLD</option>
<option value="WEAK SELL">WEAK SELL</option>

</select>

<option value="RENDAH">Rendah</option>
<option value="TINGGI">Tinggi</option>
</select>

</div>

</thead>
<tbody id="stockTableBody"></tbody>
</table>
</div>
</div>

const NETLIFY_FUNC = '/.netlify/functions/fetch-sheets';

let allData = [...EMBEDDED_DATA];
let filteredData = [...EMBEDDED_DATA];
let isLive = false;
let sortField = 'code';

let signalChart, capChart;

async function fetchLiveData() {
    const statusEl = document.getElementById('liveStatus');
    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>LOADING...';
    statusEl.className = 'live-badge loading';

    try {
        const res = await fetch(NETLIFY_FUNC, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const csvText = await res.text();
        if (!csvText || csvText.length < 1000 || !csvText.includes('Saham')) throw new Error('Invalid data');

        const parsed = parseCSV(csvText);
        if (parsed.length > 0) {
            allData = parsed;
            filteredData = [...allData];
            isLive = true;
            renderTable(); updateCounts(); renderTopMovers(); updateCharts();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('id-ID');
            document.getElementById('stockCount').textContent = allData.length;
            statusEl.innerHTML = '<i class="fas fa-satellite-dish mr-1"></i>LIVE DATA';
            statusEl.className = 'live-badge live';
            console.log('Live data loaded:', allData.length);
        }
    } catch (e) {
        console.log('Live fetch failed:', e.message);
        statusEl.innerHTML = '<i class="fas fa-exclamation-triangle mr-1"></i>LIVE ERROR';
        statusEl.className = 'live-badge error';
        setTimeout(() => { statusEl.innerHTML = '<i class="fas fa-database mr-1"></i>DATA EMBEDDED'; statusEl.className = 'live-badge embedded'; }, 3000);
    }
}

function parseCSV(text) {
    // Parse CSV with proper handling of quoted fields
    const lines = [];
    let currentLine = [];
    let currentField = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (inQuotes) {
            if (char === '"' && nextChar === '"') {
                currentField += '"';
                i++;
            } else if (char === '"') {
                inQuotes = false;
            } else {
                currentField += char;
            }
        } else {
            if (char === '"') {
                inQuotes = true;
            } else if (char === ',') {
                currentLine.push(currentField.trim());
                currentField = '';
            } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                if (char === '\r') i++;
                currentLine.push(currentField.trim());
                if (currentLine.length > 1 || currentLine[0] !== '') {
                    lines.push(currentLine);
                }
                currentLine = [];
                currentField = '';
            } else {
                currentField += char;
            }
        }
    }
    // Handle last field
    if (currentField !== '' || currentLine.length > 0) {
        currentLine.push(currentField.trim());
        lines.push(currentLine);
    }

    if (lines.length < 2) return [];

    const headers = lines[0];
    const result = [];

    for (let i = 1; i < lines.length; i++) {
        const values = lines[i];
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = values[idx] || ''; });
        result.push({
            code: obj['Saham'] || '', name: obj['Nama Perusahaan'] || '',
            price: parseFloat((obj['Harga'] || '').replace(/\./g, '').replace(',', '.')) || null,
            change: obj['Perubahan'] || '', changePercent: obj['Perubahan %'] || '',
            volume: obj['Volume'] || '', avgVolume: obj['Avg Volume'] || '',
            marketCap: obj['Market Cap'] || '', pe: obj['PE'] || '', eps: obj['EPS'] || '',
            volumeRatio: obj['Volume Ratio'] || '', statusVolume: obj['Status Volume'] || '',
            momentum: obj['Momentum'] || '', breakout: obj['Breakout'] || '',
            statusPE: obj['Status PE'] || '', statusEPS: obj['Status EPS'] || '',
            marketCapClass: obj['Kelas Market Cap'] || '', trendStrength: obj['Kekuatan Tren'] || '',
            riskLevel: obj['Tingkat Risiko'] || '',
            scoreTechnical: parseFloat((obj['Score Teknikal'] || '').replace(',', '.')) || null,
            scoreFundamental: parseFloat((obj['Score Fundamental'] || '').replace(',', '.')) || null,
            scoreRSI: parseFloat((obj['Score RSI'] || '').replace(',', '.')) || null,
            scoreTotal: parseFloat((obj['Score Total=>1'] || '').replace(',', '.')) || null,
            signal: obj['Sinyal'] || '', scalping: obj['Rekomendasi Scalping'] || '',
            category: obj['Kategori Saham'] || '', alert: obj['Alert'] || '',
            confidence: obj['Confidence Level'] || '', swingSignal: obj['Swing Signal'] || '',
            swingEntry: obj['Swing Entry'] || '', swingTarget: obj['Swing Target'] || '',
            swingStopLoss: obj['Swing Stop Loss'] || '', riskReward: obj['Risk Reward'] || '',
            riskRewardCategory: obj['Kategori RR'] || '',
            sector: getSectorFromName(obj['Nama Perusahaan'] || '')
        });
    }
    return result;
}

function getSectorFromName(name) {
    if (!name) return 'Lainnya';
    const keywords = { 'Bank':'Perbankan','BANK':'Perbankan','Mineral':'Pertambangan','Tambang':'Pertambangan','Coal':'Pertambangan','Batubara':'Pertambangan','Energi':'Energi','Power':'Energi','Telekomunikasi':'Telekomunikasi','Properti':'Properti','Property':'Properti','Konstruksi':'Konstruksi','Kontraktor':'Konstruksi','Industri':'Industri','Manufaktur':'Industri','Food':'Konsumsi','Makanan':'Konsumsi','Minuman':'Konsumsi','Retail':'Ritel','Ritel':'Ritel','Farmasi':'Farmasi','Pharma':'Farmasi','Media':'Media','Transportasi':'Transportasi','Logistik':'Transportasi','Plantation':'Perkebunan','Kebun':'Perkebunan','Sawit':'Perkebunan','Asuransi':'Asuransi','Insurance':'Asuransi','Finance':'Keuangan','Leasing':'Keuangan','Auto':'Otomotif','Mobil':'Otomotif','Motor':'Otomotif','Steel':'Baja','Cement':'Semen','Semen':'Semen','Chemical':'Kimia','Kimia':'Kimia','Textile':'Tekstil','Garmen':'Tekstil','Technology':'Teknologi','Digital':'Teknologi','Infrastructure':'Infrastruktur','Hospital':'Kesehatan','Rumah Sakit':'Kesehatan','Tourism':'Pariwisata','Hotel':'Pariwisata','Resources':'Pertambangan','Nickel':'Pertambangan' };
    const upper = name.toUpperCase();
    for (const [k, v] of Object.entries(keywords)) { if (upper.includes(k.toUpperCase())) return v; }
    return 'Lainnya';
}

function getSignalClass(signal) {
    const map = { 'STRONG BUY':'signal-strong-buy','BUY':'signal-buy','WEAK BUY':'signal-weak-buy','HOLD NEUTRAL':'signal-hold','WEAK SELL':'signal-weak-sell','SELL':'signal-sell','STRONG SELL':'signal-strong-sell' };
    return map[signal] || 'bg-slate-700 text-slate-300';
}

function getRiskClass(risk) {
    if (risk === 'RENDAH') return 'text-emerald-400 font-semibold';
    if (risk === 'TINGGI') return 'text-red-400 font-semibold';
    return 'text-amber-400';
}

function parseChangePct(val) {
    if (!val) return 0;
    try { return parseFloat(val.replace('%','').replace(',','.').replace('+','')); } catch(e) { return 0; }
}

function renderTable() {
    const tbody = document.getElementById('stockTableBody');
    tbody.innerHTML = '';
    filteredData.forEach(stock => {
        const signalClass = getSignalClass(stock.signal);
        const riskClass = getRiskClass(stock.riskLevel);
        const changeVal = parseChangePct(stock.changePercent);
        const priceColor = changeVal > 0 ? 'text-emerald-400' : changeVal < 0 ? 'text-red-400' : 'text-slate-400';
        const row = document.createElement('tr');
        row.className = 'stock-row border-b border-slate-800/50 transition';
        row.innerHTML = `<td class="px-3 py-2.5"><a href="https://www.tradingview.com/chart/?symbol=IDX:${stock.code}.JK" target="_blank" class="tv-link">${stock.code}</a></td><td class="px-3 py-2.5 text-slate-300 text-xs">${stock.name||'-'}</td><td class="px-3 py-2.5"><span class="sector-tag">${stock.sector||'Lainnya'}</span></td><td class="px-3 py-2.5 text-right font-mono text-white">${stock.price?stock.price.toLocaleString('id-ID'):'-'}</td><td class="px-3 py-2.5 text-right font-mono ${priceColor}">${stock.changePercent||stock.change||'-'}</td><td class="px-3 py-2.5 text-center"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${signalClass}">${stock.signal||'N/A'}</span></td><td class="px-3 py-2.5 text-center ${riskClass} text-xs">${stock.riskLevel||'-'}</td><td class="px-3 py-2.5 text-center font-mono text-white">${stock.scoreTotal!==null?stock.scoreTotal:'-'}</td><td class="px-3 py-2.5 text-center"><a href="https://www.tradingview.com/chart/?symbol=IDX:${stock.code}.JK" target="_blank" class="tv-btn"><i class="fas fa-external-link-alt"></i></a></td>`;
        tbody.appendChild(row);
    });
    document.getElementById('showingCount').textContent = filteredData.length;
}

function filterStocks() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const signal = document.getElementById('filterSignal').value;
    const risk = document.getElementById('filterRisk').value;
    const cap = document.getElementById('filterCap').value;
    const sector = document.getElementById('filterSector').value;
    filteredData = allData.filter(s => {
        const matchSearch = !search || (s.code&&s.code.toLowerCase().includes(search)) || (s.name&&s.name.toLowerCase().includes(search)) || (s.signal&&s.signal.toLowerCase().includes(search));
        const matchSignal = !signal || s.signal === signal;
        const matchRisk = !risk || s.riskLevel === risk;
        const matchCap = !cap || (s.marketCapClass && s.marketCapClass.includes(cap));
        const matchSector = !sector || s.sector === sector;
        return matchSearch && matchSignal && matchRisk && matchCap && matchSector;
    });
    sortData(); renderTable(); updateCounts();
}

function sortBy(field) { if (sortField === field) sortAsc = !sortAsc; else { sortField = field; sortAsc = true; } sortData(); renderTable(); }

function sortData() {
    filteredData.sort((a,b) => {
        let av = a[sortField], bv = b[sortField];
        if (typeof av === 'number' && typeof bv === 'number') return sortAsc ? av - bv : bv - av;
        av = (av||'').toString().toLowerCase(); bv = (bv||'').toString().toLowerCase();
        return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
}

function updateCounts() {
    const counts = {};
    filteredData.forEach(s => { counts[s.signal] = (counts[s.signal]||0)+1; });
    document.getElementById('countStrongBuy').textContent = counts['STRONG BUY']||0;
    document.getElementById('countBuy').textContent = counts['BUY']||0;
    document.getElementById('countWeakBuy').textContent = counts['WEAK BUY']||0;
    document.getElementById('countHold').textContent = counts['HOLD NEUTRAL']||0;
    document.getElementById('countWeakSell').textContent = counts['WEAK SELL']||0;
    document.getElementById('countSell').textContent = (counts['SELL']||0)+(counts['STRONG SELL']||0);
}

function renderTopMovers() {
    const sorted = [...allData].sort((a,b) => parseChangePct(b.changePercent) - parseChangePct(a.changePercent));
    const gainers = sorted.slice(0,5);
    const losers = sorted.slice(-5).reverse();
    let html = '<div class="space-y-2">';
    html += '<div class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider mb-1">Top Gainers</div>';
    gainers.forEach(s => { html += `<div class="flex justify-between items-center text-xs"><span class="text-slate-300">${s.code}</span><span class="gainer font-mono font-bold">${s.changePercent}</span></div>`; });
    html += '<div class="border-t border-slate-700/50 my-2"></div>';
    html += '<div class="text-[10px] font-bold text-red-400 uppercase tracking-wider mb-1">Top Losers</div>';
    losers.forEach(s => { html += `<div class="flex justify-between items-center text-xs"><span class="text-slate-300">${s.code}</span><span class="loser font-mono font-bold">${s.changePercent}</span></div>`; });
    html += '</div>';
    document.getElementById('topMovers').innerHTML = html;
}

function initCharts() {
    const signalCounts = {};
    allData.forEach(s => { if (s.signal && !s.signal.startsWith('#')) signalCounts[s.signal] = (signalCounts[s.signal] || 0) + 1; });
    signalChart = new Chart(document.getElementById('signalChart'), {
        type: 'doughnut',
        data: { labels: Object.keys(signalCounts), datasets: [{ data: Object.values(signalCounts), backgroundColor: ['#059669','#10b981','#34d399','#f59e0b','#f97316','#ef4444','#dc2626'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 10 }, boxWidth: 10 } } }, cutout: '65%' }
    });
    const capCounts = {};
    allData.forEach(s => { const cap = s.marketCapClass ? s.marketCapClass.split(' ')[0] + ' ' + s.marketCapClass.split(' ')[1] : 'Unknown'; capCounts[cap] = (capCounts[cap] || 0) + 1; });
    capChart = new Chart(document.getElementById('capChart'), {
        type: 'bar',
        data: { labels: Object.keys(capCounts), datasets: [{ data: Object.values(capCounts), backgroundColor: '#3b82f6', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#334155' } }, x: { ticks: { color: '#64748b', font: { size: 9 } }, grid: { display: false } } } }
    });
}

function updateCharts() {
    const signalCounts = {};
    allData.forEach(s => { if (s.signal && !s.signal.startsWith('#')) signalCounts[s.signal] = (signalCounts[s.signal] || 0) + 1; });
    if (signalChart) { signalChart.data.labels = Object.keys(signalCounts); signalChart.data.datasets[0].data = Object.values(signalCounts); signalChart.update(); }
    const capCounts = {};
    allData.forEach(s => { const cap = s.marketCapClass ? s.marketCapClass.split(' ')[0] + ' ' + s.marketCapClass.split(' ')[1] : 'Unknown'; capCounts[cap] = (capCounts[cap] || 0) + 1; });
    if (capChart) { capChart.data.labels = Object.keys(capCounts); capChart.data.datasets[0].data = Object.values(capCounts); capChart.update(); }
}

function refreshData() { location.reload(); }

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('lastUpdate').textContent = new Date().toLocaleString('id-ID');
    renderTable(); updateCounts(); renderTopMovers(); initCharts();
    setInterval(() => { if (isLive) fetchLiveData(); }, 5 * 60 * 1000);
});
</script>
